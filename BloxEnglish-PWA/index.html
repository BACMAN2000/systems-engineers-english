<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b1d3a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Blox English" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" /><rect width='100' height='100' rx='22' fill='%231d5ab8'/><text x='50' y='66' font-size='60' text-anchor='middle'>🍇</text></svg>" />
<title>Blox English — Grammar Adventure</title>
<style>
  :root{
    --bg1:#0b1d3a; --bg2:#11366b; --bg3:#1d5ab8;
    --gold:#ffd23f; --coral:#ff6b6b; --aqua:#4ee0d0;
    --ok:#34d399; --bad:#f87171; --ink:#0a1430;
    --card:#ffffffee; --soft:#e6f0ff; --purple:#7c3aed;
    --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left); --safe-r:env(safe-area-inset-right);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:#0a1430;overscroll-behavior:contain}
  body{
    min-height:100vh;min-height:100dvh;
    background:
      radial-gradient(circle at 20% 10%, #2a7fff55 0, transparent 40%),
      radial-gradient(circle at 80% 80%, #ff6b6b44 0, transparent 45%),
      linear-gradient(180deg,var(--bg1),var(--bg2) 40%,var(--bg3));
    background-attachment:fixed;
  }
  .shell{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
  header.top{position:sticky;top:0;z-index:20;padding:calc(var(--safe-top) + 8px) calc(var(--safe-r) + 12px) 8px calc(var(--safe-l) + 12px);
    background:linear-gradient(180deg,#0b1d3aee,#0b1d3acc 80%,transparent);backdrop-filter:blur(10px);color:#fff}
  .top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .logo{font-size:18px;font-weight:900;letter-spacing:.3px;background:linear-gradient(90deg,var(--gold),#fff7b3,var(--coral));
    -webkit-background-clip:text;background-clip:text;color:transparent;flex:1;min-width:0}
  .pill{background:#ffffff22;border:1px solid #ffffff44;color:#fff;padding:5px 10px;border-radius:999px;font-weight:700;font-size:11px}
  .stats-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .stat{flex:1;min-width:0;background:#ffffff18;border:1px solid #ffffff33;color:#fff;padding:6px 8px;border-radius:10px;font-weight:800;font-size:13px;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
  main{flex:1;padding:14px calc(var(--safe-r) + 12px) calc(var(--safe-bot) + 90px) calc(var(--safe-l) + 12px)}
  .card{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 10px 30px #00000033, inset 0 1px 0 #fff;border:1px solid #ffffff;margin-bottom:12px}
  h2.title{margin:0 0 4px;font-size:19px;line-height:1.2}
  .sub{color:#3d4d7a;margin-bottom:12px;font-size:13px;line-height:1.4}
  nav.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:6px calc(var(--safe-r) + 6px) calc(var(--safe-bot) + 6px) calc(var(--safe-l) + 6px);background:#0b1d3aee;backdrop-filter:blur(10px);border-top:1px solid #ffffff22;display:flex;justify-content:space-around}
  nav.bottom button{flex:1;background:none;border:none;color:#cfe1ff;font-size:11px;font-weight:700;padding:8px 4px;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:48px}
  nav.bottom button .em{font-size:22px}
  nav.bottom button.active{color:#ffd23f;background:#ffffff14}
  .btn{cursor:pointer;border:none;border-radius:14px;padding:14px 16px;font-weight:800;font-size:16px;background:linear-gradient(180deg,#3a8bff,#1f5fdf);color:#fff;box-shadow:0 5px 0 #103e9a;width:100%;min-height:52px;transition:.05s transform}
  .btn:active{transform:translateY(2px);box-shadow:0 3px 0 #103e9a}
  .btn:disabled{opacity:.45;filter:grayscale(.4)}
  .btn.ghost{background:#fff;color:#1f5fdf;box-shadow:0 5px 0 #c9d6ee}
  .btn.gold{background:linear-gradient(180deg,#ffd23f,#e6a700);color:#3a2a00;box-shadow:0 5px 0 #a07300}
  .btn.coral{background:linear-gradient(180deg,#ff8a8a,#e23a3a);box-shadow:0 5px 0 #8a1a1a}
  .btn.green{background:linear-gradient(180deg,#5be09a,#1ea567);box-shadow:0 5px 0 #0e6a3f}
  .btn.purple{background:linear-gradient(180deg,#a78bfa,#7c3aed);box-shadow:0 5px 0 #4c1d95}
  .btn.sm{padding:10px 12px;font-size:14px;min-height:44px}
  .row-btns{display:flex;gap:8px;flex-wrap:wrap}
  .row-btns .btn{flex:1;min-width:140px}
  .lvbar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;margin:0 -4px 8px;scrollbar-width:none}
  .lvbar::-webkit-scrollbar{display:none}
  .lvchip{flex:0 0 auto;padding:8px 12px;border-radius:12px;background:#fff;border:2px solid #cdd9f2;font-weight:800;color:#1c2a55;font-size:13px;cursor:pointer;min-width:84px;text-align:center}
  .lvchip.active{background:linear-gradient(180deg,#ffd23f,#e6a700);border-color:#a07300;color:#3a2a00}
  .lvchip.locked{opacity:.5}
  .lvchip.cleared{background:#dcfce7;border-color:#16a34a;color:#14532d}
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tile{cursor:pointer;border-radius:16px;padding:14px;background:linear-gradient(160deg,#fff,#eaf2ff);border:2px solid #cdd9f2;text-align:left;position:relative;overflow:hidden;min-height:110px;display:flex;flex-direction:column}
  .tile:active{transform:scale(.97)}
  .tile .em{font-size:28px;line-height:1}
  .tile h3{margin:6px 0 2px;font-size:14px;line-height:1.2}
  .tile p{margin:0;font-size:11px;color:#465a8a;line-height:1.3}
  .tile .stars{position:absolute;top:6px;right:8px;font-size:13px;color:#f1c40f;font-weight:800;letter-spacing:1px}
  .tile.locked{opacity:.5;filter:grayscale(.7);cursor:not-allowed}
  .tile.locked::after{content:'🔒';position:absolute;font-size:34px;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 0 14px #fff}
  .tile.done{border-color:#16a34a;background:linear-gradient(160deg,#f0fdf4,#dcfce7)}
  .tile.lesson-tile{grid-column:span 2;background:linear-gradient(160deg,#fffef2,#fff7d6);border-color:#f1c40f;min-height:auto}
  .tile.lesson-tile.done{background:linear-gradient(160deg,#f0fdf4,#dcfce7);border-color:#16a34a}
  .qcard{background:linear-gradient(180deg,#fff,#f4f8ff);border:2px solid #e3ecfb;border-radius:14px;padding:14px;margin:10px 0}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid #cdd9f2;border-radius:14px;padding:14px 16px;margin:8px 0;cursor:pointer;font-size:16px;font-weight:600;color:#1c2a55;min-height:52px}
  .opt:active{transform:scale(.98);background:#eef4ff}
  .opt.correct{background:#dcfce7;border-color:#16a34a;color:#14532d}
  .opt.wrong{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}
  .opt[disabled]{opacity:.95}
  .feedback{margin-top:8px;font-weight:700;font-size:14px}
  .feedback.ok{color:#15803d}
  .feedback.bad{color:#b91c1c}
  .input{width:100%;padding:14px;border-radius:14px;border:2px solid #cdd9f2;font-size:16px;font-weight:600;background:#fff;color:#1c2a55;min-height:52px}
  .chip{display:inline-block;padding:10px 14px;border-radius:999px;background:#eaf2ff;border:2px solid #cdd9f2;margin:4px;cursor:pointer;font-weight:700;color:#1c2a55;user-select:none;font-size:15px;min-height:42px}
  .chip:active{transform:scale(.95)}
  .chip.used{opacity:.35;text-decoration:line-through;cursor:not-allowed}
  .chip.picked{outline:3px solid #1f5fdf;background:#dbeafe}
  .slot{display:inline-block;min-width:64px;padding:8px 12px;border-bottom:3px dashed #1f5fdf;margin:0 3px;font-weight:800;color:#1f5fdf;text-align:center;cursor:pointer;border-radius:6px}
  .slot.filled{border-style:solid;background:#dcfce7;color:#14532d}
  .progress{height:8px;background:#dbe6ff;border-radius:99px;overflow:hidden;margin:8px 0 12px}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--ok),var(--gold));transition:.4s width}
  .badge-tile{background:#fff;border:2px solid #cdd9f2;border-radius:14px;padding:10px 6px;text-align:center;font-weight:700;font-size:11px;color:#1c2a55;line-height:1.2}
  .badge-tile.earned{background:linear-gradient(160deg,#fff7d6,#ffe4a3);border-color:#f1c40f}
  .badge-tile.locked{opacity:.4;filter:grayscale(.7)}
  .badge-tile .em{font-size:28px;display:block;margin-bottom:4px}
  .badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .audio-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(180deg,#a78bfa,#7c3aed);color:#fff;border:none;padding:14px;border-radius:14px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #4c1d95;font-size:15px;min-height:52px;width:100%;margin-bottom:8px}
  .audio-btn.slow{background:linear-gradient(180deg,#fbbf24,#d97706);box-shadow:0 5px 0 #92400e}
  .audio-btn:active{transform:translateY(2px);box-shadow:0 3px 0 #4c1d95}
  .audio-btn.slow:active{box-shadow:0 3px 0 #92400e}
  .reading{background:#fffef2;border:2px dashed #f1c40f;border-radius:14px;padding:14px;line-height:1.7;color:#3a2a00;font-size:16px}
  .rd-word{cursor:pointer;border-radius:5px;padding:1px 3px;transition:background .12s, color .12s, transform .12s;display:inline-block;position:relative}
  .rd-word:hover{background:#fde68a;color:#7a4d00}
  .rd-word.active, .rd-word.active b, .rd-word.active i{
    background:#f97316 !important;
    color:#ffffff !important;
    box-shadow:0 0 0 3px #fed7aa, 0 0 18px #f97316cc !important;
    border-radius:6px !important;
    transform:scale(1.12);
    font-weight:900 !important;
    animation:wordPulse .35s ease-out;
    z-index:5;
  }
  @keyframes wordPulse{0%{transform:scale(1.35);background:#fb923c}100%{transform:scale(1.12);background:#f97316}}
  .nameInput{font-size:16px;padding:14px;border-radius:14px;border:2px solid #cdd9f2;width:100%;font-weight:700;min-height:52px}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--safe-bot) + 80px);background:#0a1430ee;color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;box-shadow:0 10px 30px #000a;z-index:90;opacity:0;pointer-events:none;transition:.25s;max-width:90%;text-align:center;font-size:14px}
  .toast.show{opacity:1;transform:translate(-50%,-6px)}
  .modal-back{position:fixed;inset:0;z-index:100;background:#000a;backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
  .modal-back.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal-card{background:#fff;border-radius:22px 22px 0 0;padding:22px 18px calc(var(--safe-bot) + 22px);width:100%;max-width:520px;text-align:center;animation:slideUp .25s cubic-bezier(.2,.9,.3,1);max-height:88vh;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-card .big{font-size:54px;margin:6px}
  .stars-row{font-size:30px;color:#f1c40f;margin:8px;letter-spacing:4px}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .level-ribbon{display:inline-block;background:#ff6b6b;color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.5px;margin-left:4px}
  @keyframes heartShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) scale(1.15)}75%{transform:translateX(4px) scale(.9)}}
  /* Card & tile entrance */
  @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes tileIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .card{animation:cardIn .35s cubic-bezier(.22,.91,.36,1) both}
  .tile{animation:tileIn .35s cubic-bezier(.22,.91,.36,1) both;transition:transform .15s, box-shadow .2s}
  .tile:nth-child(1){animation-delay:.02s} .tile:nth-child(2){animation-delay:.06s}
  .tile:nth-child(3){animation-delay:.10s} .tile:nth-child(4){animation-delay:.14s}
  .tile:nth-child(5){animation-delay:.18s} .tile:nth-child(6){animation-delay:.22s}
  .tile:nth-child(7){animation-delay:.26s} .tile:nth-child(8){animation-delay:.30s}
  .tile:nth-child(9){animation-delay:.34s} .tile:nth-child(10){animation-delay:.38s}
  .tile:hover{transform:translateY(-2px);box-shadow:0 8px 24px #0003}
  .tile:not(.locked):active{transform:scale(.97)}
  /* Glow on active level chip */
  .lvchip{transition:transform .2s, box-shadow .2s}
  .lvchip.active{box-shadow:0 0 0 3px #ffd23faa,0 0 18px #ffd23f88;animation:chipPulse 1.6s infinite ease-in-out}
  .lvchip.cleared{box-shadow:0 0 12px #16a34a44}
  .lvchip:not(.locked):hover{transform:translateY(-2px) scale(1.03)}
  @keyframes chipPulse{0%,100%{box-shadow:0 0 0 3px #ffd23faa,0 0 18px #ffd23f88}50%{box-shadow:0 0 0 4px #ffd23fcc,0 0 26px #ffd23fcc}}
  /* Button "juicy" press */
  .btn{transition:transform .08s, filter .15s}
  .btn:hover:not(:disabled){filter:brightness(1.08)}
  /* Glow per level header (uses --lvl-accent set by JS) */
  h2.title{transition:text-shadow .3s}
  /* Subtle background parallax dots that pulse */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.18;
    background-image:radial-gradient(circle at 10% 20%, #ffd23f 0, transparent 1px),radial-gradient(circle at 80% 70%, #ff6b6b 0, transparent 1px),radial-gradient(circle at 40% 90%, #4ee0d0 0, transparent 1px);
    background-size:120px 120px,160px 160px,200px 200px;
    animation:bgDrift 30s linear infinite;
  }
  @keyframes bgDrift{from{background-position:0 0,0 0,0 0}to{background-position:120px 120px,-160px 160px,200px -200px}}
  .shell{position:relative;z-index:1}
  #heartsStat{cursor:pointer}
  .effect-chip{display:inline-block;background:linear-gradient(180deg,#fff7d6,#ffe4a3);border:1px solid #f1c40f;color:#7a5a00;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:800;margin-top:4px}
  .hub-section{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #e3ecfb}
  .hub-section h3{margin:0 0 8px;font-size:14px;color:#1c2a55}
  .activity-row{display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed #e3ecfb;font-size:13px}
  .activity-row:last-child{border-bottom:none}
  .activity-row .ai{font-size:22px;text-align:center}
  .activity-row b{color:#1c2a55}
  .activity-row span{color:#465a8a;font-size:11px;display:block}
  .progress-big{height:14px;background:#dbe6ff;border-radius:99px;overflow:hidden;margin:6px 0;position:relative}
  .progress-big > div{height:100%;background:linear-gradient(90deg,#34d399,#ffd23f,#ff6b6b);transition:.6s width}
  .progress-big > .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#0a1430;text-shadow:0 0 4px #ffffffaa}
  .coming-tile{background:linear-gradient(160deg,#0b1d3a,#1d5ab8);color:#fff;border-radius:10px;padding:10px;margin:6px 0;display:flex;gap:10px;align-items:center;opacity:.85}
  .coming-tile .em{font-size:24px}
  .coming-tile h4{margin:0;font-size:13px}
  .coming-tile p{margin:2px 0 0;font-size:11px;opacity:.85}
  .grammar-ribbon{display:inline-block;background:#7c3aed;color:#fff;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;margin-left:4px}
  .hint{font-size:12px;color:#465a8a;margin-top:6px;font-style:italic}
  .key{background:#fff;border:2px solid #cdd9f2;color:#1c2a55;border-radius:8px;padding:6px 10px;font-weight:800;cursor:pointer;display:inline-block;margin:3px;font-size:15px}
  /* LESSON STYLES */
  .lesson-section{margin:14px 0}
  .lesson-section h3{margin:0 0 8px;color:#7c3aed;font-size:15px;display:flex;align-items:center;gap:6px}
  .lesson-story{background:linear-gradient(160deg,#fffef2,#fff7d6);border:2px dashed #f1c40f;border-radius:12px;padding:14px;line-height:1.55;font-size:14px;color:#3a2a00;margin:8px 0;white-space:pre-wrap}
  .lesson-story b{background:#ffd23f;color:#3a2a00;padding:1px 4px;border-radius:3px}
  .formula{background:linear-gradient(160deg,#0a1430,#1d5ab8);color:#fff;padding:14px;border-radius:12px;text-align:center;font-family:'Segoe UI',sans-serif;font-size:14px;font-weight:800;margin:8px 0;line-height:1.8}
  .formula .slot{background:#ffd23f;color:#3a2a00;padding:4px 10px;border-radius:6px;display:inline-block;margin:2px;font-size:13px;border:none}
  .formula .op{color:#4ee0d0;font-weight:900;margin:0 4px}
  .rule{background:#fff;border-left:4px solid #7c3aed;padding:10px 12px;border-radius:8px;margin:6px 0;font-size:13px;line-height:1.5;box-shadow:0 1px 3px #0001}
  .rule b{color:#7c3aed}
  .example{background:#f0fdf4;border-left:4px solid #16a34a;padding:10px 12px;border-radius:8px;margin:6px 0;font-size:13px}
  .example .en{font-weight:700;color:#0a1430;font-size:14px}
  .example .es{color:#465a8a;font-size:12px;margin-top:3px}
  .irreg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin:8px 0}
  .irreg-grid .ir{background:#fff;border:2px solid #cdd9f2;padding:8px;border-radius:8px;text-align:center}
  .irreg-grid .ir b{color:#7c3aed;display:block;font-size:13px}
  .irreg-grid .ir i{color:#16a34a;font-style:normal;font-weight:700;display:block}
  .irreg-grid .ir small{color:#465a8a;display:block;font-size:11px}
  .tip{background:linear-gradient(160deg,#fff7d6,#ffe4a3);border:2px solid #f1c40f;color:#7a5a00;padding:12px;border-radius:12px;font-size:13px;margin:10px 0;line-height:1.5}
  .tip b{color:#3a2a00}
  .check-quiz{background:#fff;border:2px solid #7c3aed;border-radius:12px;padding:12px;margin:10px 0}
  .check-quiz .q{font-weight:800;color:#0a1430;margin-bottom:6px;font-size:14px}
  .install-bar{background:#fff;border-radius:14px;padding:12px;margin:8px 0;display:none;align-items:center;gap:10px;border:2px solid #ffd23f}
  .install-bar.show{display:flex}
  .install-bar p{margin:0;font-size:13px;flex:1;color:#3a2a00;font-weight:700}
  /* Tablet (~ iPad portrait) */
  @media(min-width:600px){
    .shell{max-width:760px;margin:0 auto;box-shadow:0 0 60px #0008}
    main{padding:18px 20px calc(var(--safe-bot) + 96px)}
    .menu{grid-template-columns:repeat(3,1fr)}
    .badges-grid{grid-template-columns:repeat(5,1fr)}
    .irreg-grid{grid-template-columns:repeat(3,1fr)}
    .tile.lesson-tile{grid-column:span 3}
    nav.bottom{max-width:760px;left:50%;transform:translateX(-50%);border-radius:18px 18px 0 0}
    .lvchip{min-width:96px;padding:10px 14px;font-size:14px}
  }
  /* Desktop / laptop */
  @media(min-width:1024px){
    .shell{max-width:1100px}
    main{padding:24px 28px calc(var(--safe-bot) + 100px)}
    .card{padding:22px}
    h2.title{font-size:24px}
    .sub{font-size:15px}
    .menu{grid-template-columns:repeat(4,1fr);gap:14px}
    .tile.lesson-tile{grid-column:span 4}
    .tile{min-height:130px}
    .tile h3{font-size:15px}
    .tile p{font-size:12px}
    .opt{font-size:17px;padding:16px 20px}
    .badges-grid{grid-template-columns:repeat(7,1fr)}
    nav.bottom{max-width:1100px}
    .stat{font-size:14px;padding:8px 14px}
    .lvchip{min-width:104px;padding:12px 16px;font-size:15px}
    .lvbar{padding:6px 0 14px}
  }
  /* Wide screen (1440+) */
  @media(min-width:1440px){
    .shell{max-width:1280px}
    nav.bottom{max-width:1280px}
    .badges-grid{grid-template-columns:repeat(8,1fr)}
  }
  /* Visible scrollbar on the level bar (desktop hint) */
  @media(min-width:600px){
    .lvbar{
      scrollbar-width:thin;
      scrollbar-color:#ffd23f #ffffff22;
      overflow-x:auto !important;
      -webkit-overflow-scrolling:touch;
      position:relative;
    }

5:{ name:'Navigator', emoji:'🧭', cefr:'B1 PET',

  lesson:{
    title:'Conditionals — "If... then..."',
    story:`If I <b>train</b> every day, I <b>will become</b> the strongest pirate. If you <b>find</b> the secret map, I <b>will give</b> you 100 gold coins. (This can really happen!)

But if I <b>had</b> a Mythical Devil Fruit, I <b>would be</b> unstoppable. If I <b>were</b> the king of the sea, I <b>would protect</b> all the islands. (This is only imaginary.)

Tomorrow I <b>am going to fight</b> the Captain Boss. I <b>will use</b> my new Ice Fruit. I think I <b>am going to win</b>!

🎓 The yellow words show FUTURE and CONDITIONAL forms.`,
    formula:`<b>1st Conditional (real):</b><br>If + <span class="slot">present simple</span>, <span class="slot">WILL</span> + <span class="slot">verb</span><br><br><b>2nd Conditional (imaginary):</b><br>If + <span class="slot">past simple</span>, <span class="slot">WOULD</span> + <span class="slot">verb</span>`,
    rules:[
      '<b>1st Conditional:</b> REAL or possible situation in the future. "If it rains, I will stay home."',
      '<b>2nd Conditional:</b> IMAGINARY or improbable situation. "If I were rich, I would buy a yacht."',
      'In the 2nd conditional, with BE we use <b>WERE</b> for everyone: "If I were you..." (not "was").',
      '<b>WILL</b> = spontaneous decision, prediction, promise. "I will help you!"',
      '<b>BE GOING TO</b> = plan already decided, visible evidence. "I am going to study tonight."',
      'After IF, never use WILL/WOULD. ❌ "If I will see him..." ✅ "If I see him, I will..."',
      'The order can be inverted: "I would buy a sword if I had money." (no comma needed)',
    ],
    examples:[

      {en:'If I were a pirate, I would sail the world.', es:'Imaginary (2nd conditional). Note "were", not "was".'},
      {en:'I am going to play Blox Fruits after school.', es:'A planned future action.'},
      {en:'It will rain tomorrow.', es:'A simple prediction.'},
      {en:'If she had a sword, she would fight the boss.', es:'Imaginary situation now.'},

6:{ name:'Admiral', emoji:'🎖️', cefr:'B1+ PET',

  lesson:{
    title:'Passive + Reported Speech — "It was done / He said that..."',
    story:`The legendary treasure <b>was hidden</b> by ancient pirates 200 years ago. The map <b>was found</b> by Luffy in 1850, but the island <b>has been protected</b> by a giant sea beast.

Yesterday, the captain <b>said that</b> the journey <b>was</b> too dangerous. He <b>told</b> us he <b>had seen</b> the beast before. He <b>asked</b> if we <b>were</b> ready.

The new sword <b>is being made</b> by the best blacksmith in the East Blue. It <b>will be delivered</b> next week.

🎓 In yellow: PASSIVE (what IS DONE) and REPORTED SPEECH (what someone SAID).`,
    formula:`<b>Passive:</b><br><span class="slot">subject</span><span class="op">+</span><span class="slot">BE</span><span class="op">+</span><span class="slot">past participle</span><span class="op">(+by)</span><br><br><b>Reported:</b><br>"I am tired" → He said (that) he <span class="slot">WAS</span> tired<br>(present → past, will → would, can → could)`,
    rules:[
      '<b>Passive Voice:</b> the OBJECT becomes the subject. "Pirates hide treasure" (active) → "Treasure is hidden by pirates" (passive).',
      'Passive in different tenses: <b>is/are made</b> (present), <b>was/were made</b> (past), <b>has been made</b> (perfect), <b>will be made</b> (future).',
      'Use the passive when WHO is unknown or not important: "My phone was stolen."',
      '<b>Reported speech:</b> when reporting, verbs shift one tense "back":',
      'Present → Past · Past → Past Perfect · Will → Would · Can → Could · Must → Had to',
      '<b>SAY</b> vs <b>TELL</b>: SAY (no person) "He said that..." · TELL (+ person) "He told ME that..."',
      'Reported questions: "Are you OK?" → He asked if/whether I <b>was</b> OK. (no question mark)',
    ],
    examples:[
      {en:'The map was drawn by an old pirate.', es:'Passive — past simple.'},

      {en:'She said (that) she was happy.', es:'Reported: am → was.'},
      {en:'He told me he would come the next day.', es:'Reported: will → would, tomorrow → the next day.'},
      {en:'They asked if I had seen the boss.', es:'Reported question: have → had.'},

    tip:'💡 In reported speech these also change: today→that day, tomorrow→the next day, here→there, this→that, now→then.',

7:{ name:'Pirate King', emoji:'👑', cefr:'B1+ PET advanced',
    grammar:'Wishes + 3rd Conditional + Past Perfect',
    desc:'Arrepentimientos, hipótesis del pasado y la "máquina del tiempo" gramatical.',
  lesson:{
    title:'Wishes + 3rd Conditional — "I wish I had..."',
    story:`I <b>wish</b> I <b>had trained</b> harder when I was younger. If I <b>had practised</b> more, I <b>would have beaten</b> the final boss last year.

By the time I arrived at the island, the battle <b>had already ended</b>. The other crew <b>had taken</b> all the treasure. I <b>wish</b> I <b>had</b> a faster boat now!

If Luffy <b>hadn't found</b> the Gum-Gum Fruit, he <b>wouldn't have become</b> the Pirate King. Sometimes one decision changes everything.

🎓 These are the most advanced grammar points: WISHES and 3rd CONDITIONAL.`,
    formula:`<b>Past Perfect:</b><br><span class="slot">HAD</span><span class="op">+</span><span class="slot">past participle</span><br><br><b>3rd Conditional:</b><br>If + <span class="slot">PAST PERFECT</span>, <span class="slot">WOULD HAVE</span> + <span class="slot">past participle</span><br><br><b>Wishes:</b><br>I wish + <span class="slot">past simple</span> (present)<br>I wish + <span class="slot">past perfect</span> (past)`,
    rules:[
      '<b>Past Perfect:</b> action already finished BEFORE another past action. "When I arrived, they had already left."',
      '<b>I WISH + past simple:</b> impossible PRESENT wish. "I wish I had a million dollars." (I don\'t have them now)',
      '<b>I WISH + past perfect:</b> PAST regret. "I wish I had studied more." (I didn\'t study, I regret it)',
      '<b>3rd Conditional:</b> IMAGINARY past situation. "If I had seen him, I would have helped."',
      '3rd conditional structure: If + had + V3 ... would have + V3.',
      'Variation: instead of WOULD HAVE you can use <b>could have</b> (would have been able to) or <b>might have</b> (perhaps would have).',
      '"I wish I would..." is NOT used with the same person. For your own change use "I wish I could..."',
    ],
    examples:[

      {en:'When I arrived, they had already started.', es:'Past perfect — earlier past action.'},
      {en:'She would have helped if she had known.', es:'3rd conditional with order inverted.'},
      {en:'If we hadn\'t hurried, we would have missed the boat.', es:'Negative 3rd conditional.'},
    ],
    tip:'💡 The 3rd conditional always talks about something that CAN\'T be changed any more. It is used to reflect: "What would have happened if...?"',
  },

9:{ name:'Brookhaven Citizen', emoji:'🏘️', cefr:'A2+ KET', theme:'#7c3aed',

  lesson:{
    title:'Present Simple vs Present Continuous',
    story:`Every morning Alejandro <b>wakes up</b> at seven in his Brookhaven house. He <b>eats</b> cereal and <b>drives</b> his red car to school.
But right now, look! He <b>is driving</b> a brand-new sports car and he <b>is wearing</b> sunglasses. His friends <b>are waiting</b> at the pizza place.
"Why <b>are</b> you <b>wearing</b> a costume?" asks Maya. "Today is the school dance!" answers Alejandro.
🎓 Blue verbs = ROUTINES (Present Simple). Yellow verbs = ACTIONS NOW (Present Continuous).`,
    formula:`<b>PRESENT SIMPLE</b> (rutinas / siempre):<br><span class="slot">I/You/We/They</span><span class="op">+</span><span class="slot">verb</span> · <span class="slot">He/She/It</span><span class="op">+</span><span class="slot">verb-S</span><br><br><b>PRESENT CONTINUOUS</b> (ahora mismo):<br><span class="slot">subject</span><span class="op">+</span><span class="slot">am/is/are</span><span class="op">+</span><span class="slot">verb-ING</span>`,
    rules:[
      '<b>Present Simple</b> = rutinas, hábitos, verdades. Marker: every day, usually, always, never, on Mondays.',
      '<b>Present Continuous</b> = acciones AHORA o alrededor de ahora. Marker: now, right now, today, this week, at the moment.',
      '<b>Spelling -ing:</b> run → running (doblar la última consonante), make → making (quitar la "e"), study → studying.',
      '<b>State verbs</b> normalmente NO van en continuous: like, love, want, need, know, understand, believe, have (poseer).',
      '<b>Present Continuous</b> también para planes futuros cercanos: "I am meeting Diego tomorrow."',
      'Comparación: "She works in a bank" (siempre) vs "She is working from home today" (solo hoy).',
    ],
    examples:[
      {en:'I play Brookhaven every weekend.', es:'Rutina → Present Simple.'},
      {en:'I am playing Brookhaven right now.', es:'Acción ahora → Present Continuous.'},
      {en:'She drives to school every day.', es:'Hábito.'},
      {en:'She is driving a new car this morning.', es:'Acción en curso.'},
      {en:'They don\'t live here.', es:'Negativo Present Simple.'},
      {en:'They aren\'t living here this month.', es:'Negativo Present Continuous (situación temporal).'},
    ],
    tip:'💡 Si puedes decir "right now" o "at the moment", usa CONTINUOUS. Si es "every day" o "always", usa SIMPLE.',

10:{ name:'Subway Runner', emoji:'🏃', cefr:'B1 PET', theme:'#f97316',
    grammar:'Comparatives, superlatives & adverbs of manner',
    desc:'Corre por el metro. Faster, fastest y adverbios de modo.',
  lesson:{
    title:'Comparatives, Superlatives & Adverbs',
    story:`Alejandro <b>runs faster</b> than his friend Diego. He is the <b>fastest</b> player in the team. But Maya is <b>more skilful</b> than both of them — she is the <b>most skilful</b> player.
Alejandro <b>runs quickly</b>, jumps <b>perfectly</b>, and dodges <b>carefully</b>. Today he is playing <b>better</b> than yesterday — in fact, <b>the best</b> game of his life.
🎓 Yellow words: comparativos, superlativos y adverbios de modo.`,
    formula:`<b>SHORT adjective</b> + <b>-ER / -EST</b>: fast → faster → fastest<br><b>LONG adjective</b> + MORE / MOST: skilful → more skilful → most skilful<br><br><b>ADVERB</b> = adjective + <b>-LY</b>: quick → quickly · careful → carefully<br><br>Irregular: good → better → best · bad → worse → worst · far → further → furthest`,
    rules:[
      '<b>Comparativo:</b> compara DOS cosas. "Diego is taller THAN Lucas."',
      '<b>Superlativo:</b> compara TRES o más. "Maya is THE tallest in the team."',
      '<b>Adjetivos cortos (1 sílaba):</b> + -er / -est: tall, taller, tallest. Si termina en "y", cambia a -ier: happy → happier → happiest.',
      '<b>Adjetivos largos (2+ sílabas):</b> more / most + adjetivo: beautiful → more beautiful → most beautiful.',
      '<b>Adverbios de modo</b> describen CÓMO se hace una acción. Casi siempre = adjetivo + -ly: slow → slowly, careful → carefully.',
      '<b>Irregulares:</b> good → well, fast → fast (no "fastly"), hard → hard (no "hardly" — that means "barely"!).',
      '<b>Formas comparativas con "as":</b> "as fast as" = igual de rápido. "not as fast as" = no tan rápido como.',
    ],
    examples:[
      {en:'Subway Surfers is more exciting than chess.', es:'Adjetivo largo → more.'},
      {en:'This is the longest run of the day!', es:'Superlativo → the + -est.'},
      {en:'He runs quickly through the tunnels.', es:'Adverbio quickly = how he runs.'},
      {en:'She is the best player in the world.', es:'Irregular: good → best.'},
      {en:'My score is as high as yours.', es:'Igualdad: as ... as.'},
    ],
    tip:'💡 Cuidado: "hard" como adverbio significa "duro/intensamente" (work hard). "Hardly" significa "casi nada" (I hardly eat = casi no como).',
  },

    formula:`<b>WILL</b> (predicción o decisión espontánea):<br><span class="slot">subject</span><span class="op">+</span><span class="slot">WILL</span><span class="op">+</span><span class="slot">verb</span><br><br><b>BE GOING TO</b> (plan ya decidido):<br><span class="slot">subject</span><span class="op">+</span><span class="slot">am/is/are</span><span class="op">+</span><span class="slot">going to</span><span class="op">+</span><span class="slot">verb</span><br><br><b>PRESENT CONTINUOUS</b> (cita ya organizada):<br><span class="slot">subject</span><span class="op">+</span><span class="slot">am/is/are</span><span class="op">+</span><span class="slot">verb-ING</span> + future time`,
    rules:[

      'Después de IF / WHEN / AS SOON AS, NUNCA uses WILL: "When I arrive, I will call you" ✅ no "When I will arrive..."',

  storyMode:{
    title:'The Final Circle',
    text:`Tomorrow is the World Cup Final. Alejandro and his squad — Diego, Maya, and Lucas — are going to compete against the best players on the planet. The prize is one million dollars and a giant golden trophy.
Tonight, they are sitting around a table in their gaming house. They are eating pizza and talking about the plan.
"OK, listen," says Alejandro. "Tomorrow we are going to land at Pleasant Park. The loot is the best there. After that, we will move slowly to the centre of the map. Diego is going to build the forts because he is the fastest builder. Maya will use the sniper because she is the most accurate. Lucas, you are going to carry all the medkits and shields."

"You will help everyone. If a teammate is in danger, you will build a wall. If we need to move, you will create a ramp. Without you, we won't survive."
Maya looks worried. "I think the new storm is going to close faster than usual. The map will be tiny in the final circle."
"Don't worry," says Lucas. "I will bring extra materials. We are going to be ready for anything."
The next morning, the match begins. Two hundred players jump from the battle bus. Our squad lands at Pleasant Park exactly as planned. They find amazing loot: shotguns, snipers, and a legendary jetpack.
The first hour is calm. The squad moves carefully, building forts and helping each other. By the third circle, only twenty squads are still alive.
Suddenly, the storm closes very fast — exactly as Maya predicted. "Move!" shouts Alejandro. "We are going to die if we don't run NOW!"
They sprint towards the safe zone. An enemy squad attacks from the right. Diego builds three walls in two seconds. Maya hits a perfect headshot from one hundred metres. Lucas throws a grenade behind the rocks. Alejandro eliminates the last enemy with his shotgun.
Now only one squad is left. The final circle is tiny — just a small bunker on top of a hill. Both teams meet face to face.
"I will go first," whispers Alejandro. "Cover me."
He runs out of the bunker. Bullets fly everywhere. Maya snipes one enemy. Diego builds a fortress around their position. Lucas heals everyone with the medkits. Alejandro charges with his shotgun and eliminates the last two players.
"VICTORY ROYALE!" appears on the screen. The crowd in the stadium screams. Alejandro and his squad are the new world champions. They are going to celebrate all night long.`,

🎓 Yellow words = MODAL VERBS. They never take -s and they don't use "to".`,
    formula:`<span class="slot">subject</span><span class="op">+</span><span class="slot">MODAL</span><span class="op">+</span><span class="slot">base verb</span><br><br>NEVER: modal + S · modal + TO · two modals together<br><br><b>MUST / HAVE TO</b> = obligation<br><b>SHOULD</b> = advice<br><b>MIGHT / MAY / COULD</b> = possibility<br><b>CAN / COULD</b> = ability or permission`,
    rules:[
      '<b>MUST</b> = obligación fuerte (interna o regla). "You must wear a helmet." Negativo MUST NOT (mustn\'t) = prohibición.',
      '<b>HAVE TO</b> = obligación (regla externa). "I have to go to school." Negativo DON\'T HAVE TO = no es necesario.',
      '<b>SHOULD</b> = consejo. "You should drink water." Negativo SHOULDN\'T = es mala idea.',
      '<b>CAN</b> = habilidad ("I can swim") o permiso ("Can I go?"). COULD = pasado de can o petición educada.',
      '<b>MIGHT / MAY</b> = posibilidad (tal vez sí, tal vez no). "It might rain tomorrow."',
      'Después de un modal, SIEMPRE va el verbo en forma base. ❌ "He must to go" / "He musts go" → ✅ "He must go".',
      '<b>Diferencia clave:</b> "You mustn\'t go" (¡prohibido!) ≠ "You don\'t have to go" (no es necesario, pero puedes).',
    ],

  reading:{text:`Welcome to Pokémon GO. Before you start, you must read these rules carefully.

    text:`Alejandro is a level 40 trainer in Pokémon GO. He has caught hundreds of Pokémon, but he doesn't have a Mewtwo. Today, the news says: "Legendary Mewtwo will appear in Central Park at six o'clock for one hour only."

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);

function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }
function getAvatar(){ return AVATARS.find(a=>a.id===state.avatar) || AVATARS[0]; }

/* ---------- SOUND (Web Audio API, no assets) ---------- */
function getAudioCtx(){
  if(!window._actx){
    try{ window._actx = new (window.AudioContext||window.webkitAudioContext)(); }catch{}
  }
  return window._actx;
}
function _tone({freq=440,duration=.15,type='triangle',vol=.18,slide=0,delay=0}){
  const ctx = getAudioCtx(); if(!ctx) return;
  if(ctx.state==='suspended') ctx.resume();
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if(slide) osc.frequency.linearRampToValueAtTime(Math.max(40,freq+slide), t0+duration);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
  osc.connect(g).connect(ctx.destination);
  osc.start(t0); osc.stop(t0+duration+0.05);
}
function sfx(kind){
  if(state.mute) return;
  switch(kind){
    case 'tap':       _tone({freq:520,duration:.04,type:'square',vol:.07}); break;
    case 'click':     _tone({freq:680,duration:.06,type:'square',vol:.09}); break;
    case 'swoosh':    _tone({freq:180,duration:.18,type:'sine',vol:.1,slide:560}); break;
    case 'correct':
      _tone({freq:740,duration:.10,type:'triangle',vol:.18});
      _tone({freq:1100,duration:.16,type:'triangle',vol:.18,delay:.08});
      break;
    case 'wrong':
      _tone({freq:240,duration:.18,type:'sawtooth',vol:.16,slide:-60});
      _tone({freq:160,duration:.22,type:'sawtooth',vol:.14,slide:-40,delay:.08});
      break;
    case 'heartLoss':
      _tone({freq:380,duration:.14,type:'sine',vol:.16,slide:-180});
      _tone({freq:200,duration:.30,type:'triangle',vol:.18,slide:-90,delay:.10});
      break;
    case 'levelUp':
      [523,659,784,1047].forEach((f,i)=>_tone({freq:f,duration:.16,type:'triangle',vol:.18,delay:i*.09}));
      break;
    case 'achievement':
      _tone({freq:880,duration:.12,type:'triangle',vol:.18});
      _tone({freq:1175,duration:.14,type:'triangle',vol:.18,delay:.10});
      _tone({freq:1568,duration:.30,type:'triangle',vol:.20,delay:.22});
      break;
    case 'boss':
      _tone({freq:80,duration:.4,type:'sawtooth',vol:.20,slide:-30});
      _tone({freq:150,duration:.5,type:'sawtooth',vol:.16,slide:-50,delay:.15});
      break;
    case 'unlock':
      [400,600,900].forEach((f,i)=>_tone({freq:f,duration:.18,type:'triangle',vol:.18,delay:i*.07}));
      _tone({freq:1320,duration:.4,type:'triangle',vol:.22,delay:.30});
      break;
  }
}


/* ---------- HEARTS / LIVES ---------- */
function getEarnedEffects(){
  return BADGES.filter(b=>state.badges.includes(b.id) && b.effect).map(b=>b.effect);
}
function sumEffect(type){
  return getEarnedEffects().filter(e=>e.type===type).reduce((s,e)=>s+(e.value||0),0);
}
function hasEffect(type){
  return getEarnedEffects().some(e=>e.type===type);
}
function getMaxHearts(){
  return Math.min(10, (state.maxHeartsBase||5) + sumEffect('maxHeart'));
}
function getRegenMinutes(){
  return Math.max(10, 30 - sumEffect('regenSpeed'));
}
function getXpMultiplier(ctx){
  let m = 1.0;
  m += sumEffect('xpMult')/100;
  if(ctx==='boss') m += sumEffect('xpMultBoss')/100;
  if(ctx==='lesson') m += sumEffect('xpMultLesson')/100;
  if(ctx==='streak' && state.streak>=5) m += sumEffect('streakMult')/100;
  return m;
}
function regenHearts(){
  const max = getMaxHearts();
  if(state.hearts >= max) { state.lastHeartRegen = Date.now(); return; }
  const now = Date.now();
  const last = state.lastHeartRegen || now;
  const minutes = (now - last) / 60000;
  const regenMin = getRegenMinutes();
  const gained = Math.floor(minutes / regenMin);
  if(gained > 0){
    state.hearts = Math.min(max, state.hearts + gained);
    state.lastHeartRegen = last + gained * regenMin * 60000;
    save();
  }
}
function loseHeart(){
  if(state.hearts <= 0) return;
  state.hearts -= 1;
  if(state.hearts === getMaxHearts() - 1) state.lastHeartRegen = Date.now();
  vibrate([80,40,80]);
  sfx('heartLoss');
  const h = document.getElementById('heartsStat');
  if(h){ h.style.animation='none'; h.offsetHeight; h.style.animation='heartShake .4s'; }
  save();
  if(state.hearts === 0){
    setTimeout(showOutOfHearts, 600);
  }
}
function gainHearts(n){
  state.hearts = Math.min(getMaxHearts(), state.hearts + n);
  save();
}
function showOutOfHearts(){
  const regenMin = getRegenMinutes();
  showModal({
    icon:'💔', title:'¡Te quedaste sin vidas!',
    body:`Espera ${regenMin} minutos para recuperar 1 ❤️, o gasta 1 🍇 Devil Fruit para llenar 3 vidas.<br><br>Tienes <b>${state.fruits}</b> 🍇.`,
    actions:[
      ...(state.fruits>=1 ? [{label:'🍇 Gastar 1 Fruit (+3 ❤️)',cls:'btn green',cb:()=>{
        state.fruits -= 1; gainHearts(3); save(); updateStats(); closeModal();
        toast('💖 +3 vidas');
      }}] : []),
      {label:'⏰ Esperar',cls:'btn ghost',cb:closeModal}
    ]
  });
}
// missions that should NOT cost a heart (set by the game function)
window._noLifeLoss = false;

function updateStats(){
  regenHearts();
  const L = LEVELS[state.currentLevel];
  const av = getAvatar();
  $('#lvlPill').innerHTML = `${av.em} Lv ${state.currentLevel} ${L.emoji} <span class="level-ribbon">${L.cefr}</span>`;
  $('#score').textContent = state.score;
  $('#fruits').textContent = state.fruits;
  $('#streak').textContent = state.streak;
  $('#badgeCount').textContent = state.badges.length;
  $('#hearts').textContent = state.hearts;
  $('#heartsMax').textContent = getMaxHearts();
  // visual cue when low
  const hs = $('#heartsStat');
  if(hs){ hs.style.background = state.hearts===0 ? '#7f1d1d77' : (state.hearts<=2 ? '#dc262644' : ''); }
  // pet companion floating button
  checkPetUnlocks();
  renderPetButton();
}
function renderPetButton(){
  let btn = document.getElementById('petBtn');
  const ap = state.activePet ? PETS.find(p=>p.id===state.activePet) : null;
  if(!ap){ if(btn) btn.remove(); return; }
  if(!btn){
    btn = document.createElement('div'); btn.id='petBtn';
    btn.style.cssText = 'position:fixed;right:12px;bottom:calc(var(--safe-bot) + 80px);width:54px;height:54px;border-radius:50%;background:#fff;border:3px solid #ffd23f;display:flex;align-items:center;justify-content:center;font-size:32px;z-index:25;box-shadow:0 4px 12px #0006;cursor:pointer;animation:bounce 2s infinite';
    document.body.appendChild(btn);
    if(!document.getElementById('bouncefx')){
      const st=document.createElement('style');st.id='bouncefx';
      st.textContent='@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}';
      document.head.appendChild(st);
    }
  }
  btn.textContent = ap.em;
  btn.onclick = ()=>{
    speak(ap.msg, 0.95, 'kid');
    toast(`${ap.em} ${ap.name}: ${ap.msg}`);
  };
}
function checkPetUnlocks(){
  const newPets = [];
  for(const p of PETS){
    if(!state.pets.includes(p.id) && p.unlock(state)){
      state.pets.push(p.id); newPets.push(p);
      if(!state.activePet) state.activePet = p.id;
    }
  }
  if(newPets.length){

/* ---------- Voice catalog (multi-accent + gender heuristic) ---------- */
let _voiceCache = null;
function getVoiceCatalog(){
  if(_voiceCache) return _voiceCache;
  if(!('speechSynthesis' in window)) return {all:[], byAccent:{us:[],gb:[],au:[],in:[],ca:[]}, tagged:[]};
  const all = window.speechSynthesis.getVoices().filter(v=>/^en[-_]/i.test(v.lang) || /English/i.test(v.name));
  const byAccent = {us:[],gb:[],au:[],in:[],ca:[],other:[]};
  for(const v of all){
    const lang = (v.lang||'').toLowerCase();
    if(lang.includes('us')) byAccent.us.push(v);
    else if(lang.includes('gb') || lang.includes('uk')) byAccent.gb.push(v);
    else if(lang.includes('au')) byAccent.au.push(v);
    else if(lang.includes('in')) byAccent.in.push(v);
    else if(lang.includes('ca')) byAccent.ca.push(v);
    else byAccent.other.push(v);
  }
  const FEM = /samantha|victoria|karen|moira|tessa|fiona|sara|kathy|alice|amelia|emma|olivia|sophia|ava|isabel|grace|emily|female|woman|girl|zoe|hazel|amber|laura|catherine|cathy|allison|ana|monica|kate|catherine|jenny|aria|jane|joanna|kendra|kimberly|salli|rachel|nicole/i;
  const MAS = /alex|daniel|david|fred|tom|james|john|mike|peter|paul|bruce|aaron|male|man|boy|matthew|brian|joey|justin|kevin|joseph|liam|tony|george|harry|guy/i;
  const tagged = all.map(v=>{
    let g = 'unknown';
    if(FEM.test(v.name)) g='f';
    else if(MAS.test(v.name)) g='m';
    return {voice:v, gender:g, accent:(v.lang||'').toLowerCase().split(/[-_]/)[1]||'us'};
  });
  _voiceCache = {all, byAccent, tagged};
  return _voiceCache;
}
if('speechSynthesis' in window){
  // voices may load async; rebuild cache when they arrive
  window.speechSynthesis.onvoiceschanged = ()=>{ _voiceCache=null; getVoiceCatalog(); };
}
function pickVoice(pref){
  const c = getVoiceCatalog();
  if(!c.all.length) return null;
  const userAccent = state.voiceAccent || 'us';
  const userGender = state.voiceGender || 'mix';
  // explicit accent override (e.g. 'gb-f', 'us-m', 'au', 'random')
  let accent = userAccent, gender = userGender;
  if(typeof pref === 'string'){
    const p = pref.toLowerCase();
    if(p === 'random'){
      const allList = c.all;
      return allList[Math.floor(Math.random()*allList.length)];
    }
    if(p === 'narrator'){ gender='m'; }
    if(p === 'teacher'){ gender='f'; }
    if(p === 'kid'){ gender='f'; }
    if(p === 'coach'){ gender='m'; }
    const accentMatch = p.match(/(us|gb|au|in|ca)/);
    if(accentMatch) accent = accentMatch[1];
    const genderMatch = p.match(/-([fm])/);
    if(genderMatch) gender = genderMatch[1];
  }
  let pool = c.byAccent[accent] && c.byAccent[accent].length ? c.byAccent[accent] : c.all;
  if(gender === 'f' || gender === 'm'){
    const filtered = c.tagged.filter(t=>t.gender===gender && pool.includes(t.voice));
    if(filtered.length) pool = filtered.map(t=>t.voice);
  }
  // Prefer LOCAL voices (Google network voices don't fire boundary events in Chrome)
  const local = pool.filter(v=>v.localService);
  if(local.length) pool = local;
  return pool[0] || c.all[0];
}
function speak(text, rate=0.95, pref=null, onBoundary=null){
  if(!('speechSynthesis' in window)){ toast('Audio not supported'); return; }
  window.speechSynthesis.cancel();
  if(window._fallbackTimer){ clearInterval(window._fallbackTimer); window._fallbackTimer=null; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=rate; u.pitch=1;
  const v = pickVoice(pref);
  if(v){ u.voice = v; u.lang = v.lang; }
  if(onBoundary){
    let realFired = false;
    // Real boundary events (work in Chrome with local OS voices)
    u.onboundary = (ev)=>{
      realFired = true;
      try{ onBoundary(ev.charIndex|0, ev.charLength|0); }catch{}
    };
    u.onend   = ()=>{ if(window._fallbackTimer){ clearInterval(window._fallbackTimer); window._fallbackTimer=null; } try{ onBoundary(-1); }catch{} };
    u.onerror = ()=>{ if(window._fallbackTimer){ clearInterval(window._fallbackTimer); window._fallbackTimer=null; } try{ onBoundary(-1); }catch{} };

    // Timer-based fallback: estimates word position when boundary events don't fire
    // (e.g. Google network voices, Safari iOS, some Firefox setups)
    const estWords = [];
    const ree = /(\S+)/g;
    let mm;
    while((mm=ree.exec(text))!==null) estWords.push({from:mm.index, len:mm[0].length});
    let estI = 0;
    // ~280ms per word at rate 1.0 (slightly under-estimate so highlight stays ahead)
    const perWordMs = Math.max(80, 280/Math.max(0.4, rate));
    // Start fallback fast (200ms). If real boundary fires, fallback is canceled inside the interval.
    setTimeout(()=>{
      if(realFired) return;
      // Fire the first word immediately so user sees something right away
      if(estWords[0]){
        try{ onBoundary(estWords[0].from, estWords[0].len); }catch{}
        estI = 1;
      }
      window._fallbackTimer = setInterval(()=>{
        if(realFired){ clearInterval(window._fallbackTimer); window._fallbackTimer=null; return; }
        if(estI >= estWords.length){
          clearInterval(window._fallbackTimer); window._fallbackTimer=null;
          setTimeout(()=>{ try{ onBoundary(-1); }catch{} }, perWordMs);
          return;
        }
        try{ onBoundary(estWords[estI].from, estWords[estI].len); }catch{}
        estI++;
      }, perWordMs);
    }, 200);
  }
  window.speechSynthesis.speak(u);
}
/* HTML-aware word-wrap: walks element/text nodes, wraps each word in a span,
   preserves the original markup (<b>, <i>, etc.). Plain-text offsets match
   what `text.replace(/<[^>]+>/g,'')` would produce (which is what TTS reads). */
function wrapHtmlWordsAsHtml(htmlStr){
  const tmp = document.createElement('div');
  tmp.innerHTML = htmlStr;
  const words = [];
  let plainPos = 0;
  function walk(node){
    if(node.nodeType === 3){
      const text = node.textContent;
      const frag = document.createDocumentFragment();
      const re = /(\S+)|(\s+)/g;
      let m;
      while((m = re.exec(text)) !== null){
        if(m[1]){
          const span = document.createElement('span');
          span.className = 'rd-word';
          span.dataset.i = words.length;
          span.textContent = m[1];
          frag.appendChild(span);
          words.push({from: plainPos, text: m[1]});
          plainPos += m[1].length;
        } else if(m[2]){
          frag.appendChild(document.createTextNode(m[2]));
          plainPos += m[2].length;
        }
      }
      node.parentNode.replaceChild(frag, node);
    } else if(node.nodeType === 1){
      Array.from(node.childNodes).forEach(walk);
    }
  }
  walk(tmp);
  return {html: tmp.innerHTML, words};
}
/* Reusable word-wrap helper for plain text: returns {html, words[{from,text}]} */
function wrapWordsAsHtml(text){
  const words = [];
  let html = '';
  const re = /(\S+)/g;
  let mm, lastEnd = 0;
  while((mm = re.exec(text)) !== null){
    html += text.slice(lastEnd, mm.index).replace(/\n/g,'<br>');
    const wIdx = words.length;
    words.push({from: mm.index, text: mm[1]});
    html += `<span class="rd-word" data-i="${wIdx}">${mm[1].replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`;
    lastEnd = mm.index + mm[1].length;
  }
  html += text.slice(lastEnd).replace(/\n/g,'<br>');
  return {html, words};
}
/* Returns a closure that highlights a word in `containerSelector` based on charIndex from boundary events */
function makeHighlighter(containerSelector, words){
  let lastIdx = -1;
  return function(charIdx){
    if(charIdx < 0){
      document.querySelectorAll(`${containerSelector} .rd-word.active`).forEach(x=>x.classList.remove('active'));
      lastIdx = -1; return;
    }
    let wi = -1;
    for(let i=words.length-1; i>=0; i--){ if(words[i].from <= charIdx){ wi = i; break; } }
    if(wi < 0 || wi === lastIdx) return;
    lastIdx = wi;
    document.querySelectorAll(`${containerSelector} .rd-word.active`).forEach(x=>x.classList.remove('active'));
    const el = document.querySelector(`${containerSelector} [data-i="${wi}"]`);
    if(el){
      el.classList.add('active');
      el.scrollIntoView({block:'nearest', behavior:'smooth'});
    }
  };
}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1])}

function completeMission(missionKey, stars, perfectFlags={}){
  const lv = state.currentLevel;
  const prev = state.missions[lv][missionKey] || 0;
  if(stars > prev) state.missions[lv][missionKey] = stars;
  state.totalMissions += 1;
  if(stars===3) state.tripleStars += 1;
  if(perfectFlags.vocab) state.perfectVocab += 1;
  if(perfectFlags.listen) state.perfectListen += 1;
  if(perfectFlags.spell) state.perfectSpell += 1;
  save(); checkBadges(); updateStats();
  const baseMissions = ['vocab','reading','gap','listen','order','spell'];
  const allDone = baseMissions.every(k => (state.missions[lv][k]||0) >= 1);
  if(allDone && missionKey!=='boss' && !(state.missions[lv].bossUnlockedNotified)){
    state.missions[lv].bossUnlockedNotified = true; save();
    setTimeout(()=>showModal({
      icon:'⚔️', title:'Boss Battle Unlocked!',
      body:`Defeat the ${LEVELS[lv].name} boss to unlock the next level.`,
      actions:[{label:'Fight Boss',cls:'btn coral',cb:()=>{closeModal();games.boss();}},{label:'Later',cls:'btn ghost',cb:closeModal}]
    }),600);
  }
}
function beatBoss(score, total){
  const lv = state.currentLevel;
  const win = score >= Math.ceil(total*0.66);
  if(win){
    state.bossesBeaten += 1;
    state.missions[lv].boss = Math.max(state.missions[lv].boss||0, score===total?3:(score>=total*0.83?2:1));
    state.score += 50; state.fruits += 2;
    const next = lv+1;
    let unlockedNew = false;
    if(LEVELS[next] && !state.unlocked.includes(next)){ state.unlocked.push(next); unlockedNew=true; }
    save(); checkBadges(); updateStats(); confetti();
    if(unlockedNew) sfx('unlock'); else sfx('levelUp');
    showModal({
      icon:'🏆', title:'Boss Defeated!',
      body:`+50 XP and 2 Devil Fruits!${unlockedNew?` <br><br>🎉 <b>Level ${next} unlocked: ${LEVELS[next].name}!</b><br><i>Grammar: ${LEVELS[next].grammar}</i>`:''}`,
      actions: unlockedNew
        ? [{label:`Go to Level ${next}`,cls:'btn green',cb:()=>{state.currentLevel=next;save();updateStats();closeModal();home();}},
           {label:'Stay here',cls:'btn ghost',cb:closeModal}]
        : [{label:'Continue',cls:'btn green',cb:closeModal}]
    });
  } else {
    save(); updateStats();
    showModal({icon:'💀',title:'The Boss won!',body:`You got ${score}/${total}. Train more!`,
      actions:[{label:'Rematch',cls:'btn coral',cb:()=>{closeModal();games.boss();}},{label:'Menu',cls:'btn ghost',cb:()=>{closeModal();home();}}]});
  }
}
function checkBadges(){
  let newOnes = [];
  for(const b of BADGES){
    if(!state.badges.includes(b.id) && b.cond(state)){
      state.badges.push(b.id);
      newOnes.push(b);
      // apply one-shot effects
      if(b.effect){
        if(b.effect.type==='maxHeart'){
          // when max grows, also give the heart so it feels rewarding
          state.hearts = Math.min(getMaxHearts(), state.hearts + b.effect.value);
        }
        if(b.effect.type==='unlockAvatar' && !state.avatarsOwned.includes(b.effect.value)){
          state.avatarsOwned.push(b.effect.value);
        }
      }
    }
  }
  save();
  if(newOnes.length){
    const b = newOnes[0];
    const fx = b.desc ? `<br><span class="effect-chip">✨ ${b.desc}</span>` : '';
    setTimeout(()=>showModal({icon:b.em,title:`New Badge: ${b.name}!`,body:`You earned the <b>${b.name}</b> badge.${fx}`,
      actions:[{label:'Awesome!',cls:'btn gold',cb:closeModal}]}),400);
  }
}
function calcStars(score,total){
  const pct=score/total;
  if(pct>=1) return 3;
  if(pct>=0.8) return 2;
  if(pct>=0.5) return 1;
  return 0;
}

          <p>${m.storyMode?'¡Historia completada! Vuelve cuando quieras.':'Escucha la historia con play/pause/stop a velocidad lenta, normal o rápida + preguntas de comprensión.'}</p>
        </div>` : ''}
      </div>
    </div>
    <div class="card">
      <button class="btn coral" id="bossBtn" ${allBase?'':'disabled'}>
        ⚔️ Boss Battle ${m.boss?starHTML(m.boss):''}
      </button>
      <div class="hint" style="text-align:center;margin-top:8px">${allBase?'Defeat the boss to unlock the next level!':'Complete all 6 missions first.'}</div>
    </div>
    <div id="installBar" class="install-bar">
      <span style="font-size:24px">📲</span>
      <p>Install on home screen?</p>
      <button class="btn sm gold" style="width:auto;flex:0" id="installBtn">Install</button>
    </div>`;
  function menuTile(key,em,h,p,star){
    return `<div class="tile ${star?'done':''}" data-go="${key}">
      <span class="em">${em}</span><h3>${h}</h3><p>${p}</p>
      <div class="stars">${starHTML(star||0)}</div>
    </div>`;
  }
  const bar = $('#lvbar');
  let activeChip = null;
  for(let i=1;i<=12;i++){
    const c=document.createElement('span');
    const unlocked = state.unlocked.includes(i);
    const cleared = (state.missions[i]?.boss||0) >= 1;
    c.className='lvchip'+(i===lv?' active':'')+(unlocked?'':' locked')+(cleared?' cleared':'');
    c.innerHTML = `${LEVELS[i].emoji}<br>Lv ${i}`;
    if(unlocked) c.onclick=()=>{ sfx('click'); state.currentLevel=i; save(); updateStats(); home(); };
    else c.onclick=()=>{ sfx('wrong'); toast('🔒 Vence el boss del nivel anterior'); };
    bar.appendChild(c);
    if(i===lv) activeChip = c;
  }
  // Mouse wheel → horizontal scroll
  bar.addEventListener('wheel', (e)=>{
    if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
      e.preventDefault();
      bar.scrollLeft += e.deltaY;
    }
  }, {passive:false});
  // Drag to scroll (desktop mouse)
  let isDown=false, startX=0, startScroll=0;
  bar.addEventListener('mousedown',(e)=>{ isDown=true; startX=e.pageX; startScroll=bar.scrollLeft; bar.style.cursor='grabbing'; });
  window.addEventListener('mouseup',()=>{ isDown=false; bar.style.cursor=''; });
  bar.addEventListener('mouseleave',()=>{ isDown=false; bar.style.cursor=''; });
  bar.addEventListener('mousemove',(e)=>{ if(!isDown) return; e.preventDefault(); bar.scrollLeft = startScroll - (e.pageX - startX); });
  // Arrow buttons
  const prev = document.getElementById('lvbarPrev');
  const next = document.getElementById('lvbarNext');
  if(prev) prev.onclick=()=>bar.scrollBy({left:-200, behavior:'smooth'});
  if(next) next.onclick=()=>bar.scrollBy({left:200, behavior:'smooth'});
  function refreshArrows(){
    if(!prev||!next) return;
    prev.style.opacity = bar.scrollLeft <= 4 ? '.35' : '1';
    next.style.opacity = bar.scrollLeft + bar.clientWidth >= bar.scrollWidth - 4 ? '.35' : '1';
  }
  bar.addEventListener('scroll', refreshArrows);
  setTimeout(refreshArrows, 50);
  // Auto-scroll to keep the active level visible
  if(activeChip){
    setTimeout(()=>{
      const target = activeChip.offsetLeft - (bar.clientWidth/2) + (activeChip.offsetWidth/2);
      bar.scrollTo({left:Math.max(0,target), behavior:'smooth'});
    }, 80);
  }
  document.querySelectorAll('.tile').forEach(t=>{ t.onclick=()=>{
    if(t.classList.contains('locked')) { sfx('wrong'); return; }
    sfx('tap');
    window._noLifeLoss = false;
    const k = t.dataset.go;
    const seriousMissions = ['gap','listen','spell','findError','storyMode','boss','coach'];
    if(seriousMissions.includes(k) && state.hearts<=0){ showOutOfHearts(); return; }
    if(['vocab','speed','order','reading','lesson','vocabLesson'].includes(k)) window._noLifeLoss = true;
    setBackButton(true);
    games[k]();
  }; });
  $('#bossBtn').onclick=()=>{
    if(!allBase) return;
    if(state.hearts<=0){ showOutOfHearts(); return; }
    sfx('boss');
    window._noLifeLoss = false;
    setBackButton(true);
    games.boss();
  };

  if(window._deferredPrompt){
    $('#installBar').classList.add('show');
    $('#installBtn').onclick=async()=>{
      window._deferredPrompt.prompt();
      const r = await window._deferredPrompt.userChoice;
      if(r.outcome==='accepted') toast('🎉 Installed!');
      window._deferredPrompt = null;
      $('#installBar').classList.remove('show');
    };
  }
}

  const smHighlight = makeHighlighter('#storyText', smWords);

  $('#smSlow').onclick=()=>setRate(0.65,'smSlow');
  $('#smNorm').onclick=()=>setRate(1.0,'smNorm');
  $('#smFast').onclick=()=>setRate(1.4,'smFast');

  $('#smPlay').onclick=()=>{

    speak(SM.text, rate, 'narrator', smHighlight);

  };
  $('#smPause').onclick=()=>{
    if(window.speechSynthesis.paused){
      window.speechSynthesis.resume();

    } else if(window.speechSynthesis.speaking){
      window.speechSynthesis.pause();
      $('#smPause').textContent = '▶ Resume';

  $('#smStop').onclick=()=>{
    window.speechSynthesis.cancel();
    $('#smPause').textContent = '⏸ Pause';
    smHighlight(-1);
  };
  $('#backBtn').onclick=()=>{ window.speechSynthesis.cancel(); home(); };

  // Click any word → play from that word (with live highlight)
  document.querySelectorAll('#storyText .rd-word').forEach(el=>{

      const subHL = (ci)=>{ if(ci<0) smHighlight(-1); else smHighlight(fromChar + ci); };
      speak(subtext, rate, 'narrator', subHL);
      sfx('tap');
      $('#smPause').textContent = '⏸ Pause';
    };
  });

  $('#goQs').onclick=()=>{
    window.speechSynthesis.cancel();
    document.getElementById('qCard').style.display='block';
    $('#goQs').style.display='none';
    showQ();
  };

  function showQ(){
    if(qIdx >= SM.qs.length){
      const stars = mistakes===0 ? 3 : mistakes<=1 ? 2 : 1;
      completeMission('storyMode', stars);
      confetti();
      showModal({icon:'📖', title:'Story Mode complete!',
        body:`Score: ${correct}/${SM.qs.length}<div class="stars-row">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`,
        actions:[{label:'Home',cls:'btn green',cb:()=>{closeModal();home();}}]});
      return;
    }
    const q = SM.qs[qIdx];

    const box = $('#qBox');

    </div>`;
    box.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
      const ok = b.dataset.a === q.a;
      box.querySelectorAll('.opt').forEach(o=>{
        o.disabled=true;
        if(o.dataset.a===q.a) o.classList.add('correct');
        else if(o===b) o.classList.add('wrong');
      });
      if(ok){ correct++; award(true,12); } else { mistakes++; award(false); }
      setTimeout(()=>{ qIdx++; showQ(); }, 900);
    });
  }
};

games.vocab = function(){
  const L = LEVELS[state.currentLevel];
  const items = shuffle(L.vocab).slice(0,6);
  let matches=0, mistakes=0;
  let sel=null;
  const left = items.map(o=>({key:o.w,label:o.w}));
  const right = shuffle(items.map(o=>({key:o.w,label:o.e+'  '+o.d})));
  main.innerHTML = `<div class="card">
    <h2 class="title">🍇 Vocabulary Match</h2>
    <div class="sub">Tap a word, then its meaning.</div>
    <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:6px" id="board"></div>
  </div>`;
  const board = $('#board');
  const Lcol=document.createElement('div');Lcol.style.cssText='display:flex;flex-direction:column;gap:6px';
  const Rcol=document.createElement('div');Rcol.style.cssText='display:flex;flex-direction:column;gap:6px';
  left.forEach(o=>{
    const d=document.createElement('div');d.className='chip';d.style.cssText='margin:0;text-align:center;padding:14px 8px';d.textContent=o.label;d.dataset.k=o.key;d.dataset.side='L';
    d.onclick=()=>pick(d); Lcol.appendChild(d);
  });
  right.forEach(o=>{
    const d=document.createElement('div');d.className='chip';d.style.cssText='margin:0;text-align:left;padding:12px 10px;font-size:13px';d.textContent=o.label;d.dataset.k=o.key;d.dataset.side='R';
    d.onclick=()=>pick(d); Rcol.appendChild(d);
  });
  board.appendChild(Lcol); board.appendChild(Rcol);
  function pick(el){
    if(el.classList.contains('used')) return;
    if(!sel){ sel=el; el.classList.add('picked'); return; }
    if(sel===el){ el.classList.remove('picked'); sel=null; return; }
    if(sel.dataset.side===el.dataset.side){ sel.classList.remove('picked'); sel=el; el.classList.add('picked'); return; }
    if(sel.dataset.k===el.dataset.k){
      sel.classList.remove('picked'); sel.classList.add('used'); el.classList.add('used');
      sel.style.cssText+=';background:#dcfce7;border-color:#16a34a;color:#14532d;text-decoration:none;opacity:1';
      el.style.cssText+=';background:#dcfce7;border-color:#16a34a;color:#14532d;text-decoration:none;opacity:1';
      sel=null; matches++; award(true,8);
      if(matches===items.length){
        confetti();
        const stars = mistakes===0?3 : mistakes<=2?2 : 1;
        completeMission('vocab', stars, {vocab: mistakes===0});
        setTimeout(()=>showModal({icon:'🏆',title:'Mission Complete!',body:`Mistakes: ${mistakes}<div class="stars-row">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`,
          actions:[{label:'Home',cls:'btn green',cb:()=>{closeModal();home();}}]}),700);
      }
    } else {
      const a=sel,b=el; a.classList.remove('picked');
      a.style.borderColor='#dc2626'; b.style.borderColor='#dc2626';
      setTimeout(()=>{a.style.borderColor='';b.style.borderColor=''},500);
      sel=null; mistakes++; award(false);
    }
  }
};

games.reading = function(){
  const L = LEVELS[state.currentLevel];
  const text = L.reading.text; const qs = L.reading.qs;
  let i=0, correct=0;
  function render(){
    if(i>=qs.length){
      const stars = calcStars(correct, qs.length);
      completeMission('reading', stars);
      main.innerHTML = `<div class="card"><h2 class="title">📖 Done!</h2>
        <p>Score: <b>${correct}/${qs.length}</b></p>
        <div class="stars-row">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
        <div class="row-btns" style="margin-top:10px">
          <button class="btn green" onclick="games.reading()">Again</button>
          <button class="btn ghost" onclick="home()">Home</button>
        </div></div>`;
      if(stars===3) confetti();
      return;
    }
    const Q = qs[i];
    // Tokenize text into clickable word spans (preserves whitespace + line breaks)
    const words = []; // [{from: charIdx, text: string}]
    let html = '';
    const re = /(\S+)/g;
    let mm, lastEnd = 0;
    while((mm = re.exec(text)) !== null){
      html += text.slice(lastEnd, mm.index).replace(/\n/g,'<br>');
      const wIdx = words.length;
      words.push({from: mm.index, text: mm[1]});
      html += `<span class="rd-word" data-i="${wIdx}">${mm[1].replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span>`;
      lastEnd = mm.index + mm[1].length;
    }
    html += text.slice(lastEnd).replace(/\n/g,'<br>');

    main.innerHTML = `<div class="card">
      <h2 class="title">📖 Reading (${i+1}/${qs.length})</h2>
      <div class="progress"><div style="width:${(i/qs.length)*100}%"></div></div>
      <div class="hint" style="margin-bottom:6px">💡 Tap any word to hear the audio from that point</div>
      <div class="reading" id="rdText">${html}</div>
      ${audioPlayerHTML('rd','Listen')}
      <div class="qcard">
        <b>${Q.q}</b>
        <div id="opts"></div>
        <div id="fb" class="feedback"></div>
      </div>
    </div>`;
    const rdHighlight = makeHighlighter('#rdText', words);
    wireAudioPlayer('rd', ()=>text.replace(/\n/g,' '), 'narrator', rdHighlight);

    // Click any word → speak from that word at the current rate (with live highlight from that point)
    function getRdRate(){
      if(document.getElementById('rdSlow')?.classList.contains('gold')) return 0.65;
      if(document.getElementById('rdFast')?.classList.contains('gold')) return 1.4;
      return 1.0;
    }
    document.querySelectorAll('#rdText .rd-word').forEach(el=>{
      el.onclick=()=>{
        const wi = +el.dataset.i;
        const fromChar = words[wi].from;
        const subtext = text.slice(fromChar).replace(/\n/g,' ');
        window.speechSynthesis.cancel();
        // Sub-highlighter: shifts charIdx by fromChar so it maps back to original words array
        const subHL = (ci)=>{ if(ci<0) rdHighlight(-1); else rdHighlight(fromChar + ci); };
        speak(subtext, getRdRate(), 'narrator', subHL);
        sfx('tap');
        document.querySelectorAll('#rdText .rd-word.active').forEach(x=>x.classList.remove('active'));
        el.classList.add('active');
        const pauseBtn = document.getElementById('rdPause');
        if(pauseBtn) pauseBtn.textContent = '⏸ Pause';
      };
    });
    shuffle(Q.opts).forEach(o=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=o;
      b.onclick=()=>{
        document.querySelectorAll('#opts .opt').forEach(x=>x.disabled=true);
        if(o===Q.a){ b.classList.add('correct'); $('#fb').textContent='✅ Correct!'; $('#fb').className='feedback ok'; correct++; award(true,10); }
        else{ b.classList.add('wrong'); document.querySelectorAll('#opts .opt').forEach(x=>{if(x.textContent===Q.a)x.classList.add('correct')});
              $('#fb').textContent='❌ Correct: '+Q.a; $('#fb').className='feedback bad'; award(false); }
        setTimeout(()=>{i++;render()},1300);
      };
      $('#opts').appendChild(b);
    });
  }
  render();
};

/* ============== GAP FILL ============== */
games.gap = function(){
  const L = LEVELS[state.currentLevel];
  const S = L.gap[Math.floor(Math.random()*L.gap.length)];
  let answers = Array(S.bank.length).fill(null);
  let selectedWord=null;
  function render(){
    let html = S.text;
    for(let i=0;i<S.bank.length;i++){
      const v = answers[i] ? `<span class="slot filled" data-slot="${i}">${answers[i]}</span>` :
                             `<span class="slot" data-slot="${i}">__${i+1}__</span>`;
      html = html.replace('___'+(i+1)+'___', v);
    }
    main.innerHTML=`<div class="card">
      <h2 class="title">📝 Gap Fill</h2>
      <div class="sub">Tap a word, then a blank. Tap a filled blank to clear it.</div>
      <div class="reading" id="story" style="font-size:16px">${html}</div>
      <div style="margin-top:10px" id="bank"></div>
      <div class="hint" id="hint">Tap a slot to see the hint.</div>
      <div class="row-btns" style="margin-top:10px">
        <button class="btn coral sm" id="clr">↺ Clear</button>
        <button class="btn green" id="chk">✔ Check</button>
      </div>
    </div>`;
    const bank=$('#bank');
    const usedCount = {};
    answers.forEach(a=>{ if(a) usedCount[a]=(usedCount[a]||0)+1; });
    const bankCount = {};
    S.bank.forEach(w=>{ bankCount[w]=(bankCount[w]||0)+1; });
    const drawn = {};
    shuffle(S.bank).forEach(w=>{
      const c=document.createElement('span'); c.className='chip'; c.textContent=w;
      drawn[w]=(drawn[w]||0)+1;
      const remaining = bankCount[w] - (usedCount[w]||0);
      if(drawn[w] > remaining) c.classList.add('used');
      c.onclick=()=>{ if(c.classList.contains('used'))return;
        document.querySelectorAll('.chip').forEach(x=>x.classList.remove('picked'));
        c.classList.add('picked'); selectedWord=w; toast('"'+w+'"');
      };
      bank.appendChild(c);
    });
    document.querySelectorAll('.slot[data-slot]').forEach(s=>{
      s.onclick=()=>{
        const i=+s.dataset.slot;
        $('#hint').textContent='Hint: '+S.hints[i];
        if(answers[i]){ answers[i]=null; render(); return; }
        if(!selectedWord){ toast('Pick a word first'); return; }
        answers[i]=selectedWord; selectedWord=null; render();
      };
    });
    $('#clr').onclick=()=>{ answers=Array(S.bank.length).fill(null); render(); };
    $('#chk').onclick=()=>{
      let ok=0;
      for(let i=0;i<S.bank.length;i++) if(answers[i]===S.bank[i]) ok++;
      const stars = calcStars(ok, S.bank.length);
      completeMission('gap', stars);
      if(ok===S.bank.length){ confetti(); state.score+=20; updateStats(); save();

          <button class="btn ghost" onclick="home()">Home</button>
        </div></div>`;
      if(stars===3) confetti();
      return;
    }
    const target = sents[i];
    if(chosen.length===0 && pool.length===0){
      pool = shuffle(target.replace(/\.$/,'').split(' '));
    }
    main.innerHTML=`<div class="card">
      <h2 class="title">🧩 Sentence (${i+1}/${sents.length})</h2>

        <div style="margin-top:10px" id="pool">
          ${pool.map(w=>`<span class="chip" data-w="${w}">${w}</span>`).join('')}
        </div>
        <div id="fb" class="feedback"></div>
      </div>
      <div class="row-btns" style="margin-top:10px">
        <button class="btn coral sm" id="undo">↺ Clear</button>
        <button class="btn green" id="chk">✔ Check</button>
      </div>
    </div>`;
    document.querySelectorAll('#pool .chip').forEach(c=>{
      c.onclick=()=>{ chosen.push(c.dataset.w); pool.splice(pool.indexOf(c.dataset.w),1); render(); };
    });
    document.querySelectorAll('#line .key').forEach(c=>{
      c.onclick=()=>{ const w=c.dataset.c; pool.push(w); chosen.splice(chosen.indexOf(w),1); render(); };
    });
    $('#undo').onclick=()=>{ pool=pool.concat(chosen); chosen=[]; render(); };
    $('#chk').onclick=()=>{
      const made = chosen.join(' ');
      const ok = made.toLowerCase() === target.replace(/\.$/,'').toLowerCase();
      if(ok){ $('#fb').textContent='✅ "'+target+'"'; $('#fb').className='feedback ok'; correct++; award(true,12); }
      else{ $('#fb').textContent='❌ "'+target+'"'; $('#fb').className='feedback bad'; award(false); }
      setTimeout(()=>{i++;chosen=[];pool=[];render();},1700);
    };
  }
  render();
};

/* ============== SONIC SPEED ROUND (60 sec timed) ============== */
games.speed = function(){
  const L = LEVELS[state.currentLevel];
  // build pool: boss + coach quiz questions
  const pool = [...L.boss, ...(COACHES[state.currentLevel]?.quiz||[])];
  let timeLeft = 60 + (state.flags.time||0);
  state.flags.time = 0;
  let goals = 0, idx = 0, used = shuffle(pool);
  let timer;
  function endRound(){
    clearInterval(timer);
    const newHi = goals > (state.speedHighScore||0);
    if(newHi){ state.speedHighScore = goals; }
    completeMission('speed', goals>=15?3 : goals>=10?2 : goals>=5?1 : 0);
    save(); checkBadges(); updateStats();
    if(goals>=10) confetti();
    showModal({icon:newHi?'🏆':'💨',title:newHi?`¡NUEVO RÉCORD! ${goals} rings`:`Speed Round: ${goals} rings`,
      body:`💨 Como Sonic — respondiste <b>${goals}</b> preguntas correctas en 60 segundos.<br>${newHi?'¡Récord personal superado!':'Récord: '+(state.speedHighScore||0)}`,
      actions:[
        {label:'💨 Otra vuelta',cls:'btn purple',cb:()=>{closeModal();games.speed();}},
        {label:'Home',cls:'btn ghost',cb:()=>{closeModal();home();}}
      ]});
  }
  function next(){
    if(timeLeft<=0){ endRound(); return; }
    if(idx>=used.length) used = shuffle(pool).concat(used);
    const Q = used[idx++];
    main.innerHTML = `
      <div class="card" style="background:linear-gradient(160deg,#dbeafe,#a5b4fc);border:2px solid #4338ca">
        <h2 class="title">💨 Sonic Speed Round</h2>
        <div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0">
          <div style="font-size:18px;font-weight:900;color:#4338ca">⏱️ ${timeLeft}s</div>
          <div style="font-size:18px;font-weight:900;color:#16a34a">⭕ ${goals} rings</div>
        </div>
        <div class="progress"><div style="width:${(timeLeft/(60+(state.flags.time||0)))*100}%;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981)"></div></div>
        <div class="qcard"><b>${Q.q}</b><div id="opts"></div></div>
        <button class="btn ghost sm" onclick="clearInterval(window._sptmr); home()">Stop ⏹</button>
      </div>`;
    shuffle(Q.opts).forEach(o=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=o;
      b.onclick=()=>{
        if(o===Q.a){ b.classList.add('correct'); goals++; timeLeft += 1; state.score += 5; toast('💨 Ring +1!'); vibrate(30); }
        else{ b.classList.add('wrong'); timeLeft -= 2; toast('💥 -2 sec!'); vibrate([60,30,60]); }
        save(); updateStats();
        setTimeout(next, 350);
      };
      $('#opts').appendChild(b);
    });
  }
  // start timer
  timer = setInterval(()=>{
    timeLeft--; if(timeLeft<=0){ endRound(); }
    const el = document.querySelector('.card .title'); if(el){ const t = document.querySelector('div[style*="⏱️"]'); }
  }, 1000);
  window._sptmr = timer;
  next();
};
