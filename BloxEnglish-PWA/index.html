        // Match against the full wrong phrase (could be multi-word)
        const wrongWords = Q.wrong.split(' ');
        const isWrong = wrongWords.some(ww => ww.toLowerCase().replace(/[.,!?]/g,'') === cleaned.toLowerCase());
        if(isWrong){
          span.style.background='#dcfce7'; span.style.borderColor='#16a34a'; span.style.color='#14532d';
          $('#fb').innerHTML = `🔍 ¡Detectado! Correcto: <b>${Q.fix}</b>`;
          $('#fb').className = 'feedback ok'; correct++; award(true,12);
        } else {
          span.style.background='#fee2e2'; span.style.borderColor='#dc2626'; span.style.color='#7f1d1d';
          // highlight the actual wrong word
          document.querySelectorAll('#sentEl span').forEach(s=>{
            const sw = s.textContent.toLowerCase();
            if(Q.wrong.split(' ').some(ww => ww.toLowerCase().replace(/[.,!?]/g,'') === sw)){
              s.style.background='#fef08a'; s.style.borderColor='#eab308';
            }
          });
          $('#fb').innerHTML = `❌ El error era "<b>${Q.wrong}</b>" → "<b>${Q.right}</b>"<br>Correcto: ${Q.fix}`;
          $('#fb').className = 'feedback bad'; award(false);
        }
        setTimeout(()=>{i++;next();},2200);
      };
      sentEl.appendChild(span);
      if(punct){ const p=document.createElement('span'); p.textContent=punct; p.style.fontWeight='800'; sentEl.appendChild(p); }
    });
  }
  next();
};

/* ============== STRONGMAN SHOP (Power-Ups) ============== */
function shop(){
  main.innerHTML = `<div class="card" style="background:linear-gradient(160deg,#fff7d6,#fde68a);border:2px solid #f59e0b">
    <h2 class="title">💪 Strongman Shop</h2>
    <div class="sub">Gasta tus 🍎 Devil Fruits en power-ups. Has gastado: <b>${state.totalSpent||0}</b> 🍎</div>
    <div style="font-size:22px;text-align:center;margin:8px 0;font-weight:900;color:#16a34a">🍎 ${state.fruits} Devil Fruits</div>
    <div id="powerupList"></div>
  </div>
  <div class="card">
    <h3 style="margin:0 0 8px">⚡ Power-Ups Activos</h3>
    <div style="font-size:13px;color:#465a8a">
      ${state.flags.xp2 ? '✅ XP Boost x2 activo<br>' : ''}
      ${state.flags.shield ? '✅ Streak Shield activo<br>' : ''}
      ${state.flags.hint ? '✅ Hint disponible<br>' : ''}
      ${(state.flags.time||0)>0 ? '✅ +'+state.flags.time+' seg en próximo Speed Round<br>' : ''}
      ${(!state.flags.xp2 && !state.flags.shield && !state.flags.hint && !state.flags.time) ? '<i>Sin power-ups activos</i>' : ''}
    </div>
    <button class="btn ghost sm" style="margin-top:10px" onclick="home()">⬅ Home</button>
  </div>`;
  const list = $('#powerupList');
  POWERUPS.forEach(p=>{
    const can = state.fruits >= p.cost;
    const owned = (state.powerups[p.id]||0);
    const div = document.createElement('div');
    div.style.cssText = 'background:#fff;border:2px solid #cdd9f2;border-radius:12px;padding:12px;margin:8px 0;display:flex;align-items:center;gap:10px';
    div.innerHTML = `
      <span style="font-size:36px">${p.em}</span>
      <div style="flex:1">
        <div style="font-weight:800;font-size:14px">${p.name} ${owned?`<span style="color:#16a34a">x${owned}</span>`:''}</div>
        <div style="font-size:12px;color:#465a8a">${p.desc}</div>
        <div style="font-size:13px;color:#16a34a;font-weight:700;margin-top:2px">🍎 ${p.cost}</div>
      </div>`;
    const buyBtn = document.createElement('button');
    buyBtn.className = 'btn sm '+(can?'green':'ghost');
    buyBtn.textContent = can ? 'Comprar' : '🔒';
    buyBtn.disabled = !can;
    buyBtn.style.cssText = 'width:auto;flex:0 0 auto;min-width:80px';
    buyBtn.onclick = ()=>{
      if(state.fruits < p.cost) return;
      state.fruits -= p.cost; state.totalSpent = (state.totalSpent||0) + p.cost;
      state.powerups[p.id] = (state.powerups[p.id]||0) + 1;
      // activate immediately
      if(p.id==='x2') state.flags.xp2 = true;
      if(p.id==='shield') state.flags.shield = true;
      if(p.id==='hint') state.flags.hint = true;
      if(p.id==='time') state.flags.time = (state.flags.time||0) + 10;
      save(); checkBadges(); updateStats(); toast(`💪 ${p.name} activado!`);
      shop();
    };
    div.appendChild(buyBtn);
    list.appendChild(div);
  });
}

/* ============== ADOPT ME PETS Screen ============== */
function petsScreen(){
  main.innerHTML = `<div class="card" style="background:linear-gradient(160deg,#fce7f3,#fbcfe8);border:2px solid #ec4899">
    <h2 class="title">🐶 Adopt Me Pets</h2>
    <div class="sub">Has desbloqueado <b>${state.pets.length}/${PETS.length}</b> mascotas. Toca una para hacerla tu compañera activa.</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px" id="petList"></div>
  </div>
  <div class="card">
    <button class="btn ghost sm" onclick="home()">⬅ Home</button>
  </div>`;
  const list = $('#petList');
  PETS.forEach(p=>{
    const owned = state.pets.includes(p.id);
    const active = state.activePet === p.id;
    const div = document.createElement('div');
    div.style.cssText = `background:${active?'linear-gradient(160deg,#fef3c7,#fde68a)':'#fff'};border:2px solid ${active?'#f59e0b':'#cdd9f2'};border-radius:14px;padding:12px;text-align:center;cursor:${owned?'pointer':'default'};${owned?'':'opacity:.45;filter:grayscale(.7)'}`;
    div.innerHTML = `<div style="font-size:42px">${owned?p.em:'🔒'}</div>
      <div style="font-weight:800;font-size:13px;margin-top:4px">${p.name}</div>
      <div style="font-size:11px;color:#465a8a">${active?'⭐ ACTIVA':owned?'Disponible':'🔒 Bloqueada'}</div>`;
    if(owned){
      div.onclick = ()=>{ state.activePet = p.id; save(); updateStats(); toast(`${p.em} ${p.name} es tu compañera!`); petsScreen(); };
    }
    list.appendChild(div);
  });
}

/* ============== AVATAR SELECTOR ============== */
function avatarScreen(){
  main.innerHTML = `<div class="card">
    <h2 class="title">👤 Avatar — Personaliza tu pirata</h2>
    <div class="sub">Avatar actual: <b>${getAvatar().em} ${getAvatar().name}</b><br>🍎 ${state.fruits} Devil Fruits para comprar nuevos</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px" id="avList"></div>
  </div>
  <div class="card">
    <button class="btn ghost sm" onclick="settings()">⬅ Volver a Settings</button>
  </div>`;
  const list = $('#avList');
  AVATARS.forEach(a=>{
    const owned = state.avatarsOwned.includes(a.id);
    const active = state.avatar === a.id;
    const can = state.fruits >= a.cost;
    const div = document.createElement('div');
    div.style.cssText = `background:${active?'linear-gradient(160deg,#fef3c7,#fde68a)':owned?'#fff':'#f4f8ff'};border:3px solid ${active?'#f59e0b':owned?'#16a34a':'#cdd9f2'};border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;${!owned&&!can?'opacity:.55':''}`;
    div.innerHTML = `<div style="font-size:36px">${a.em}</div>
      <div style="font-weight:800;font-size:11px;margin-top:2px">${a.name}</div>
      <div style="font-size:10px;color:#465a8a;line-height:1.2">${active?'⭐ ACTIVO':owned?'✅ Tuyo':a.cost===0?'Gratis':'🍎 '+a.cost}</div>`;
    div.onclick = ()=>{
      if(active) return;
      if(owned){ state.avatar=a.id; save(); updateStats(); toast(`${a.em} ${a.name} equipado!`); avatarScreen(); return; }
      if(state.fruits >= a.cost){
        state.fruits -= a.cost; state.totalSpent = (state.totalSpent||0) + a.cost;
        state.avatarsOwned.push(a.id); state.avatar = a.id;
        save(); checkBadges(); updateStats(); toast(`🛒 Compraste ${a.em} ${a.name}!`);
        avatarScreen();
      } else {
        toast(`Te faltan ${a.cost - state.fruits} 🍎`);
      }
    };
    list.appendChild(div);
  });
}

/* ============== DAILY REWARD (Bee Swarm) ============== */
function checkDailyReward(){
  const today = new Date().toDateString();
  if(state.lastDailyReward === today) return;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  const continued = state.lastDailyReward === yesterday;
  state.dailyStreak = continued ? (state.dailyStreak||0)+1 : 1;
  const bonus = Math.min(state.dailyStreak, 7);
  state.fruits += bonus; state.score += bonus*5;
  state.lastDailyReward = today;
  save(); updateStats();
  setTimeout(()=>showModal({icon:'🐝',title:`Daily Reward — Día ${state.dailyStreak}`,
    body:`🐝 Bee Swarm te trae miel diaria!<br><br>+<b>${bonus}</b> 🍎 Devil Fruits<br>+<b>${bonus*5}</b> ⭐ XP<br><br>${continued?'🔥 ¡Racha de '+state.dailyStreak+' días!':'Vuelve mañana para más!'}`,
    actions:[{label:'¡Genial!',cls:'btn gold',cb:closeModal}]}), 800);
}

/* ---------- PWA ---------- */
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); window._deferredPrompt = e;
});

/* ---------- boot ---------- */
window.addEventListener('load',()=>{
  if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); }
  updateStats(); home();
  if(state.score>0) setTimeout(()=>toast(`Welcome back, Captain ${state.name}! 🏴‍☠️`),300);
  const m = state.missions[state.currentLevel]||{};
  if(!m.lesson && state.totalMissions===0){
    setTimeout(()=>toast('📜 ¡Empieza por la Grammar Lesson!'), 1200);
  }
  // Bee Swarm daily reward
  setTimeout(()=>checkDailyReward(), 1500);
});
